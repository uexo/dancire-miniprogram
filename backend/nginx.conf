# 单词热 - Nginx 配置
# 保存到 /etc/nginx/sites-available/wordheat

upstream wordheat {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.wordheat.com localhost;
    
    # 日志配置
    access_log /var/log/nginx/wordheat_access.log;
    error_log /var/log/nginx/wordheat_error.log;
    
    # 客户端 body 大小限制
    client_max_body_size 10M;
    
    # 代理配置
    location / {
        proxy_pass http://wordheat;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓存
        proxy_cache_bypass $http_upgrade;
    }
    
    # 健康检查端点
    location /health {
        access_log off;
        proxy_pass http://wordheat/health;
    }
}

